services:
  postgres:
    image: postgres:16-alpine
    container_name: biblioteca-cultura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: biblioteca_cultura
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - biblioteca_cultura_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d biblioteca_cultura"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  biblioteca_cultura_pgdata: