<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinição de senha</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <!--icons importados do fontsawesome talvez não pegue ?-->
    <link rel="stylesheet" th:href="@{/css/redefinir-senha.css}">
</head>
<body>

    <header>
        <div class="navbar">
            <div class="nav-left">
                <i class="fa-solid fa-bars"></i>
                <span style="font-size: 18px;">MENU</span>
            </div>
            <div class="brand-title"><img th:src="@{/images/logo-horizontal.png}" width="230px"></div>
            <div class="perfil-funcionario">
                <p style="font-size: 18px;">Jessica Alves</p>
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="form-header">
            <h1>Redefinir senha:</h1>
            <p>Preencha os dados abaixo para criar uma nova senha:</p>
        </div>

        <form action="#" method="POST">
            
            <fieldset class="form-grid">
                <div class="input-group full-width">
                    <label for="nome">Senha atual:</label>
                    <input type="password" id="senha-atual" name="senha-atual" required>
                </div>
                
                <div class="input-group">
                    <label for="cpf">Nova senha:</label>
                    <input type="password" id="nova-senha" name="nova-senha" required>
                </div>

                <div class="input-group">
                    <label for="matricula">Confirmar nova senha:</label>
                    <input type="password" id="confirmar-senha" name="confirmar-senha" required>
                </div>
            </fieldset>

            <div class="btn-container">
                <button type="submit" class="btn-submit">Salvar alterações</button>
            </div>

        </form>
    </main>

</body>
</html>
